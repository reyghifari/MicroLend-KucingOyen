server:
  port: 8080

spring:
  application:
    name: microlend
  datasource:
    url: jdbc:postgresql://localhost:5437/microlend
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

daml:
  json-api:
    url: http://localhost:7575
  admin:
    token: ${DAML_ADMIN_TOKEN:}
  finance:
    package-id: ${DAML_FINANCE_PACKAGE_ID:1fcbb967b4df70b2afbfc3f370fbfe3c723649c176aa6572eebeb38870d0c9c4}

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG